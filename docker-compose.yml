services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-frying_pan}
      POSTGRES_USER: ${POSTGRES_USER:-frying_pan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-frying_pan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-frying_pan} -d ${POSTGRES_DB:-frying_pan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    working_dir: /app/backend
    environment:
      FRYING_PAN_STORAGE_ROOT: ${FRYING_PAN_STORAGE_ROOT:-../storage}
      FRYING_PAN_DATABASE_URL: ${FRYING_PAN_DATABASE_URL:-postgresql+psycopg://frying_pan:frying_pan@postgres:5432/frying_pan}
      FRYING_PAN_CORS_ORIGINS: ${FRYING_PAN_CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - ./backend:/app/backend
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    working_dir: /app/frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
